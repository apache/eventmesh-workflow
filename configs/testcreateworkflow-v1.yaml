document:
  dsl: '1.0.3'
  namespace: eventmesh.apache.org
  name: store-order-management
  version: '1.0.0'
  title: Store Order Management Workflow
use:
  functions:
    sendOrder:
      call: asyncapi
      with:
        operation: file://orderapp.yaml#sendOrder
    sendPayment:
      call: asyncapi
      with:
        operation: file://paymentapp.yaml#sendPayment
    sendShipment:
      call: asyncapi
      with:
        operation: file://expressapp.yaml#sendExpress
do:
  - receiveNewOrderEvent:
      listen:
        to:
          one:
            with:
              type: online.store.newOrder
              source: store/order
      then: checkNewOrderResult
  - checkNewOrderResult:
      switch:
        - newOrderSuccessful:
            when: .order_no != ""
            then: sendOrderPayment
        - newOrderFailed:
            then: end
  - sendOrderPayment:
      call: asyncapi
      with:
        operation: file://paymentapp.yaml#sendPayment
      then: checkPaymentStatus
  - checkPaymentStatus:
      switch:
        - paymentSuccessful:
            when: .order_no != ""
            then: sendOrderShipment
        - paymentDenied:
            then: end
  - sendOrderShipment:
      call: asyncapi
      with:
        operation: file://expressapp.yaml#sendExpress
      then: end
